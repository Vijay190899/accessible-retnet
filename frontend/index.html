<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RetNet 124M</title>
  <style>
    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #2e3147;
      --accent:  #7c6af7;
      --accent2: #56cfb2;
      --text:    #e2e8f0;
      --muted:   #718096;
      --danger:  #fc8181;
      --r:       10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 1.7rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p { color: var(--muted); font-size: 0.85rem; margin-top: 0.4rem; }

    .wrap { width: 100%; max-width: 800px; }

    /* ── Prompt box ── */
    .prompt-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 1.2rem;
      margin-bottom: 1rem;
    }

    .prompt-box label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }

    #prompt {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 0.75rem 1rem;
      font-size: 0.95rem;
      font-family: 'Consolas', 'Fira Code', monospace;
      resize: vertical;
      min-height: 110px;
      transition: border 0.2s;
      line-height: 1.6;
    }

    #prompt:focus { outline: none; border-color: var(--accent); }

    /* ── Quick prompts ── */
    .quick-label {
      font-size: 0.73rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: 0.45rem;
    }

    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin-bottom: 1rem;
    }

    .pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.28rem 0.8rem;
      font-size: 0.78rem;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      user-select: none;
    }
    .pill:hover { border-color: var(--accent); color: var(--text); }

    /* ── Params ── */
    .params {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 1rem 1.2rem;
      margin-bottom: 1rem;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.9rem 1.5rem;
    }

    .param label {
      display: block;
      font-size: 0.73rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .slider-row input[type="range"] {
      flex: 1;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .badge {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--accent2);
      min-width: 2.6rem;
      text-align: right;
    }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      gap: 0.7rem;
      margin-bottom: 1.4rem;
    }

    button {
      padding: 0.65rem 1.4rem;
      border-radius: 6px;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    #btn-gen {
      background: linear-gradient(135deg, var(--accent), #5c51d4);
      color: #fff;
      flex: 1;
    }

    #btn-clear {
      background: var(--border);
      color: var(--muted);
    }

    /* ── Output ── */
    #output-wrap { display: none; }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }

    .output-header span {
      font-size: 0.73rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--accent2);
    }

    #copy-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      font-size: 0.75rem;
      padding: 0.2rem 0.6rem;
    }
    #copy-btn:hover { border-color: var(--accent2); color: var(--accent2); }

    #output-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 1.1rem 1.2rem;
      font-family: 'Consolas', 'Fira Code', monospace;
      font-size: 0.9rem;
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 80px;
    }

    /* full prompt + completion displayed together */
    .part-prompt   { color: var(--muted); }
    .part-new      { color: var(--text); }
    .part-error    { color: var(--danger); }

    .spinner {
      display: inline-block;
      width: 13px; height: 13px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      margin-top: 2.5rem;
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
    }
    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>

<header>
  <h1>RetNet 124M</h1>
  <p>Accessible RetNet &nbsp;·&nbsp; Pretrained on WikiText-103 &nbsp;·&nbsp; RTX 2070</p>
</header>

<div class="wrap">

  <!-- Prompt -->
  <div class="prompt-box">
    <label for="prompt">Prompt</label>
    <textarea id="prompt" placeholder="Start typing and the model will continue your text…

e.g.  The history of artificial intelligence begins with"></textarea>
  </div>

  <!-- Quick prompts -->
  <div class="quick-label">Quick starts</div>
  <div class="pills" id="pills"></div>

  <!-- Parameters -->
  <div class="params">
    <div class="param">
      <label>Max new tokens</label>
      <div class="slider-row">
        <input type="range" id="max-tokens" min="20" max="500" value="200" step="10">
        <span class="badge" id="max-tokens-v">200</span>
      </div>
    </div>
    <div class="param">
      <label>Temperature</label>
      <div class="slider-row">
        <input type="range" id="temperature" min="0.1" max="1.5" value="0.8" step="0.05">
        <span class="badge" id="temperature-v">0.80</span>
      </div>
    </div>
    <div class="param">
      <label>Top-p (nucleus)</label>
      <div class="slider-row">
        <input type="range" id="top-p" min="0.5" max="1.0" value="0.9" step="0.01">
        <span class="badge" id="top-p-v">0.90</span>
      </div>
    </div>
    <div class="param">
      <label>Repetition penalty</label>
      <div class="slider-row">
        <input type="range" id="rep-penalty" min="1.0" max="2.0" value="1.3" step="0.05">
        <span class="badge" id="rep-penalty-v">1.30</span>
      </div>
    </div>
  </div>

  <!-- Buttons -->
  <div class="btn-row">
    <button id="btn-gen">&#9654;&nbsp; Generate</button>
    <button id="btn-clear">Clear</button>
  </div>

  <!-- Output -->
  <div id="output-wrap">
    <div class="output-header">
      <span id="out-label">Completion</span>
      <button id="copy-btn">Copy</button>
    </div>
    <div id="output-box"></div>
  </div>

</div>

<footer>
  RetNet &mdash; <a href="https://arxiv.org/abs/2307.08621" target="_blank">arxiv:2307.08621</a>
  &nbsp;&middot;&nbsp;
  <a href="https://github.com/Vijay190899/accessible-retnet" target="_blank">GitHub</a>
  &nbsp;&middot;&nbsp; Val PPL 15.09 on WikiText-103
</footer>

<script>
  // ── Slider sync ──────────────────────────────────────────────────────
  [
    ["max-tokens",  v => String(Math.round(v))],
    ["temperature", v => (+v).toFixed(2)],
    ["top-p",       v => (+v).toFixed(2)],
    ["rep-penalty", v => (+v).toFixed(2)],
  ].forEach(([id, fmt]) => {
    const sl = document.getElementById(id);
    const bd = document.getElementById(id + "-v");
    bd.textContent = fmt(sl.value);
    sl.addEventListener("input", () => bd.textContent = fmt(sl.value));
  });

  // ── Quick-start pills ─────────────────────────────────────────────────
  const PROMPTS = [
    "The history of artificial intelligence begins with",
    "In the year 2045, humanity discovered that",
    "Neural networks are computational models inspired by",
    "Once upon a time in a land far away,",
    "The most important scientific discovery of the 21st century was",
    "Deep learning has transformed the field of",
    "The capital city of France is Paris, which",
  ];

  const pillBox = document.getElementById("pills");
  PROMPTS.forEach(text => {
    const p = document.createElement("div");
    p.className = "pill";
    p.textContent = text.length > 42 ? text.slice(0, 42) + "…" : text;
    p.title = text;
    p.onclick = () => { document.getElementById("prompt").value = text; };
    pillBox.appendChild(p);
  });

  // ── Generate ──────────────────────────────────────────────────────────
  const btnGen    = document.getElementById("btn-gen");
  const btnClear  = document.getElementById("btn-clear");
  const outWrap   = document.getElementById("output-wrap");
  const outBox    = document.getElementById("output-box");
  const outLabel  = document.getElementById("out-label");
  const copyBtn   = document.getElementById("copy-btn");

  let lastCompletion = "";

  btnGen.addEventListener("click", async () => {
    const prompt = document.getElementById("prompt").value.trim();
    if (!prompt) { alert("Please enter a prompt."); return; }

    btnGen.disabled = true;
    btnGen.innerHTML = '<span class="spinner"></span>&nbsp; Generating…';
    outWrap.style.display = "block";
    outLabel.innerHTML = '<span class="spinner"></span>&nbsp; Generating…';
    outBox.innerHTML = "";

    try {
      const res = await fetch("/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          prompt,
          max_tokens:  +document.getElementById("max-tokens").value,
          temperature: +document.getElementById("temperature").value,
          top_p:       +document.getElementById("top-p").value,
          rep_penalty: +document.getElementById("rep-penalty").value,
        }),
      });

      const data = await res.json();
      if (data.error) {
        outBox.innerHTML = `<span class="part-error">Error: ${data.error}</span>`;
        outLabel.textContent = "Error";
      } else {
        lastCompletion = data.completion || "";
        // Show prompt dimmed + new text bright
        outBox.innerHTML =
          `<span class="part-prompt">${esc(prompt)}</span>` +
          `<span class="part-new">${esc(lastCompletion)}</span>`;
        outLabel.textContent = "Completion";
      }
    } catch (e) {
      outBox.innerHTML = `<span class="part-error">Network error: ${e.message}</span>`;
      outLabel.textContent = "Error";
    } finally {
      btnGen.disabled = false;
      btnGen.innerHTML = "&#9654;&nbsp; Generate";
    }
  });

  btnClear.addEventListener("click", () => {
    document.getElementById("prompt").value = "";
    outWrap.style.display = "none";
    outBox.innerHTML = "";
    lastCompletion = "";
  });

  copyBtn.addEventListener("click", () => {
    if (!lastCompletion) return;
    navigator.clipboard.writeText(lastCompletion).then(() => {
      copyBtn.textContent = "Copied!";
      setTimeout(() => copyBtn.textContent = "Copy", 1500);
    });
  });

  // Ctrl+Enter to generate
  document.addEventListener("keydown", e => {
    if ((e.ctrlKey || e.metaKey) && e.key === "Enter") btnGen.click();
  });

  function esc(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }
</script>
</body>
</html>
